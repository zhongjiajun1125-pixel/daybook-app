<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Daybook - 认知显影系统</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="time-day">
    <nav id="global-tools" class="hidden">
      <button id="export-data-btn" class="ghost-btn" type="button" aria-label="导出数据">Export</button>
      <button id="history-toggle" class="ghost-btn" type="button" aria-label="时间线">Timeline</button>
    </nav>

    <main id="app-root" class="app-shell">
      
      <section id="onboarding-view" class="view-section active">
        <div class="narrative-shell">
          <p>这里是你的记录空间。</p>
          <br>
          <p>不需要整理，不需要写得完整，也不需要想清楚。</p>
          <p>你只需要开始记录一件正在发生的事，或者一个正在出现的想法。</p>
          <p>甚至一句话，一个词，都可以被保存。</p>
          <br>
          <p>这个系统不会评价你写了什么，只负责记住。</p>
          <br>
          <p>当你准备好了，开始第一条记录。</p>
        </div>
        <div class="action-shell">
          <button id="enter-writing-btn" class="primary-action-btn" type="button">→ 开始记录</button>
        </div>
      </section>

      <section id="compose-view" class="view-section hidden">
        <div class="compose-shell">
          <aside id="system-echo-panel" class="echo-panel empty" aria-live="polite"></aside>

          <article class="writing-card">
            <textarea
              id="raw-memory-input"
              class="seamless-input"
              placeholder="写下此刻。"
              autofocus
            ></textarea>
          </article>

          <div class="compose-footer">
            <span id="save-status" class="status-indicator"></span>
            <button id="save-entry-btn" class="subtle-submit-btn" type="button">完成</button>
          </div>
        </div>
      </section>

      <aside id="history-panel" class="history-panel hidden" aria-hidden="true">
        <div class="history-header">
          <h2>系统记录</h2>
          <button id="close-history-btn" class="close-btn" type="button">返回</button>
        </div>
        <div class="history-list" id="history-list"></div>
      </aside>
    </main>

    <template id="history-entry-template">
      <article class="history-item">
        <div class="history-meta">
          <time class="history-time"></time>
          <span class="history-friction hidden"></span> </div>
        <p class="history-raw-text"></p>
      </article>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
