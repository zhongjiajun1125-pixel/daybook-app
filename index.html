<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1b1e" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#f9fafb" media="(prefers-color-scheme: light)">
    
    <title>Trace - 認知顯影系統</title>
    
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Ccircle cx='256' cy='256' r='200' fill='%23171717'/%3E%3C/svg%3E">
    
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="time-day">
    <nav id="global-tools" class="hidden">
      <input type="file" id="import-file-input" accept=".json" style="display: none;" />
      <button id="import-data-btn" class="ghost-btn" type="button">導入</button>
      <button id="export-data-btn" class="ghost-btn" type="button">導出</button>
      <button id="history-toggle" class="ghost-btn" type="button">歷史</button>
    </nav>

    <main id="app-root" class="app-shell">
      
      <section id="unlock-view" class="view-section active" style="display: flex; align-items: center; justify-content: center; height: 100%;">
        <button id="unlock-btn" class="ghost-btn" style="font-size: 1.1rem; letter-spacing: 0.2em; padding: 20px;">觸碰以喚醒</button>
      </section>

      <section id="onboarding-view" class="view-section hidden">
        <div class="narrative-shell">
          <p>這裡是 Trace。</p>
          <p>一個由 cyh 構建的認知顯影系統。</p>
          <br>
          <p>它不會對你做任何評價。</p>
          <p>不需要整理，也不需要寫得完整。</p>
          <p>你只需要丟下一件正在發生的事，或一個閃現的想法。</p>
          <p>哪怕只有幾個字。</p>
          <br>
          <p>系統只負責吞嚥和保存。</p>
          <p>並在未來的某一天，向你折射出潛意識的真實軌跡。</p>
          <br>
          <p>當你準備好了，留下第一道印跡。</p>
          
          <p style="margin-top: 48px; font-size: 0.9rem; color: var(--text-ghost); font-family: 'Songti SC', serif; letter-spacing: 0.05em;">
            — Created by cyh
          </p>
        </div>
        <div class="action-shell">
          <button id="enter-writing-btn" class="primary-action-btn" type="button">→ 開始記錄</button>
        </div>
      </section>

      <section id="compose-view" class="view-section hidden">
        <div class="compose-shell">
          <aside id="system-echo-panel" class="echo-panel empty" aria-live="polite"></aside>

          <article class="writing-card">
            <textarea
              id="raw-memory-input"
              class="seamless-input"
              placeholder="寫下此刻。"
              autofocus
            ></textarea>
          </article>

          <div class="compose-footer">
            <span id="save-status" class="status-indicator"></span>
            <div style="display: flex; gap: 24px;">
              <button id="swallow-btn" class="subtle-submit-btn" type="button">吞噬</button>
              <button id="save-entry-btn" class="subtle-submit-btn" type="button">封存</button>
            </div>
          </div>
        </div>
      </section>

      <aside id="history-panel" class="history-panel hidden" aria-hidden="true">
        <div class="history-header">
          <h2>系統記錄</h2>
          <button id="close-history-btn" class="close-btn" type="button">返回</button>
        </div>
        <div class="history-list" id="history-list"></div>
      </aside>
    </main>

    <template id="history-entry-template">
      <article class="history-item">
        <div class="history-meta">
          <time class="history-time"></time>
          <span class="history-friction hidden"></span>
        </div>
        <p class="history-raw-text"></p>
      </article>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
