<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1b1e" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#f9fafb" media="(prefers-color-scheme: light)">
    
    <title>Trace</title>
    
    <link rel="manifest" href="./manifest.json?v=20260401-5">
    <link rel="icon" href="./image.png">
    <link rel="apple-touch-icon" href="./image.png">
    
    <link rel="stylesheet" href="./styles.css?v=20260401-2" />
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.getRegistrations()
            .then((registrations) => Promise.all(registrations.map((registration) => registration.unregister())))
            .then(() => ("caches" in window ? caches.keys().then((keys) => Promise.all(keys.map((key) => caches.delete(key)))) : undefined))
            .catch(() => {});
        });
      }
    </script>
  </head>
  <body class="time-day">
    <nav id="global-tools" class="hidden">
      <input type="file" id="import-file-input" accept=".json" style="display: none;" />
      <button id="font-toggle-btn" class="ghost-btn" type="button">字体</button>
      <button id="vault-toggle-btn" class="ghost-btn" type="button">保险库</button>
      <button id="import-data-btn" class="ghost-btn" type="button">导入</button>
      <button id="export-data-btn" class="ghost-btn" type="button">导出</button>
      <button id="history-toggle" class="ghost-btn" type="button">历史</button>
    </nav>

    <div id="trace-loading" class="trace-loading hidden" aria-live="polite" aria-atomic="true">
      <svg id="trace-loading-mark" class="trace-logo trace-logo--loading" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path class="trace-logo-path" d="M150 100 C150 140, 110 170, 70 150 C40 135, 30 95, 50 70 C70 45, 110 45, 135 70" stroke="currentColor" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span id="trace-loading-label" class="trace-loading-label">正在进入…</span>
    </div>

    <main id="app-root" class="app-shell">
      
      <section id="unlock-view" class="view-section unlock-view hidden">
        <div class="unlock-shell">
          <div class="trace-identity trace-identity--unlock">
            <svg id="unlock-trace-mark" class="trace-logo trace-logo--unlock" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path class="trace-logo-path" d="M150 100 C150 140, 110 170, 70 150 C40 135, 30 95, 50 70 C70 45, 110 45, 135 70" stroke="currentColor" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="trace-wordmark trace-wordmark--identity">Trace</span>
          </div>
          <p id="unlock-title" class="unlock-title">输入密码</p>
          <p id="unlock-subtitle" class="unlock-subtitle">本地保护已开启</p>
          <div id="pin-panel" class="pin-panel">
            <input
              id="pin-input"
              class="pin-input"
              type="password"
              inputmode="numeric"
              pattern="[0-9]*"
              maxlength="6"
              autocomplete="off"
              placeholder="输入 PIN"
            />
          </div>
          <button id="unlock-btn" class="unlock-btn unlock-btn--primary" type="button">进入</button>
        </div>
      </section>

      <section id="onboarding-view" class="view-section active">
        <div class="threshold-shell">
          <div class="trace-identity trace-identity--hero">
            <svg id="onboarding-trace-mark" class="trace-logo trace-logo--hero" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path class="trace-logo-path" d="M150 100 C150 140, 110 170, 70 150 C40 135, 30 95, 50 70 C70 45, 110 45, 135 70" stroke="currentColor" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="trace-wordmark trace-wordmark--identity">Trace</span>
          </div>
          <p id="threshold-line" class="threshold-line">Not everything needs to be said.</p>
          <div class="action-shell action-shell--threshold">
            <button id="enter-writing-btn" class="primary-action-btn" type="button">Begin</button>
          </div>
        </div>
      </section>

      <section id="compose-view" class="view-section hidden">
        <div class="compose-shell">
          <aside id="system-echo-panel" class="echo-panel empty" aria-live="polite"></aside>
          <div id="echo-card-layer" class="echo-card-layer" aria-live="polite" aria-atomic="true">
            <article id="echo-card" class="echo-card hidden">
              <button id="echo-card-close" class="echo-card-close" type="button" aria-label="关闭">×</button>
              <p id="echo-card-line-1" class="echo-card-line"></p>
              <p id="echo-card-line-2" class="echo-card-line"></p>
              <p id="echo-card-line-3" class="echo-card-line echo-card-tail"></p>
            </article>
          </div>

          <article class="writing-card">
            <div class="paper-header">
              <div class="paper-presence">
                <svg id="compose-trace-mark" class="trace-logo trace-logo--mark" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                  <path class="trace-logo-path" d="M150 100 C150 140, 110 170, 70 150 C40 135, 30 95, 50 70 C70 45, 110 45, 135 70" stroke="currentColor" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span class="paper-kicker">现在</span>
              </div>
              <span id="font-style-label" class="paper-meta">默认</span>
            </div>
            <textarea
              id="raw-memory-input"
              class="seamless-input"
              placeholder="写下此刻。"
              autofocus
            ></textarea>
            
            <div id="cognitive-anchors" class="anchor-bar">
              <button class="anchor-btn" data-anchor="澄明">清楚</button>
              <button class="anchor-btn" data-anchor="游离">发散</button>
              <button class="anchor-btn" data-anchor="焦滞">卡住</button>
              <button class="anchor-btn" data-anchor="沉缩">低落</button>
            </div>
          </article>

          <div class="compose-footer">
            <span id="save-status" class="status-indicator"></span>
            <div class="footer-actions">
              <button id="swallow-btn" class="subtle-submit-btn" type="button">略过</button>
              <button id="save-entry-btn" class="subtle-submit-btn" type="button">保存</button>
            </div>
          </div>
        </div>
      </section>

      <aside id="history-panel" class="history-panel hidden" aria-hidden="true">
        <div class="history-header">
          <h2>历史记录</h2>
          <button id="close-history-btn" class="close-btn" type="button">返回</button>
        </div>
        
        <div id="history-pattern-layer" class="history-pattern-layer empty">
          <div class="insight-overview">
            <div id="insight-summary" class="trend-card trend-wide"></div>
            <div id="trend-energy" class="trend-card"></div>
            <div id="trend-focus" class="trend-card"></div>
            <div id="trend-prediction" class="trend-card trend-wide"></div>
            <div id="trend-risk" class="trend-card trend-wide"></div>
          </div>
          <div class="insight-graph">
            <canvas id="insight-canvas"></canvas>
          </div>
          <div class="insight-trends">
            <div id="insight-legend" class="insight-legend"></div>
          </div>
        </div>
        
        <div class="history-list" id="history-list"></div>
      </aside>
    </main>

    <template id="history-entry-template">
      <article class="history-item">
        <div class="history-primary">
          <div class="history-meta">
            <time class="history-time"></time>
            <span class="history-metadata hidden"></span>
            <span class="history-friction hidden"></span>
            <button class="history-delete-btn" type="button">删除</button>
          </div>
          <p class="history-raw-text"></p>
        </div>
        <div class="history-secondary hidden">
          <p class="history-echo-text"></p>
        </div>
      </article>
    </template>

    <script src="./app.js?v=20260401-8"></script>
  </body>
</html>
