<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inknote</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <label class="language-switch" aria-label="语言选择">
        <select id="language-select">
          <option value="zh-CN">中文</option>
          <option value="en">EN</option>
        </select>
      </label>
      <button id="history-toggle" class="history-toggle" type="button" aria-label="查看历史">
        记录
      </button>
      <button
        id="history-backdrop"
        class="history-backdrop hidden"
        type="button"
        aria-label="关闭历史记录"
      ></button>

      <section class="compose-view" id="compose-view">
        <div class="compose-shell">
          <div class="hero-copy">
            <p id="hero-line" class="hero-line">把你的生活，变成可以被看懂的数据。</p>
          </div>

          <article id="returning-card" class="context-card hidden" aria-live="polite">
            <p id="returning-kicker" class="context-kicker"></p>
            <p id="returning-summary" class="context-text"></p>
          </article>

          <article id="insight-card" class="context-card hidden" aria-live="polite">
            <p id="streak-text" class="context-kicker"></p>
            <p id="pattern-text" class="context-text"></p>
          </article>

          <textarea
            id="entry-input"
            class="entry-input"
            placeholder="写下此刻。"
            autofocus
          ></textarea>

          <article id="reflection-anchor-card" class="reflection-anchor-card hidden" aria-live="polite">
            <p id="reflection-anchor-label" class="card-label">上一问</p>
            <p id="reflection-anchor-text" class="reflection-anchor-text"></p>
          </article>

          <div class="compose-footer">
            <span id="save-hint">自动保存草稿</span>
            <button id="submit-entry-button" class="submit-button" type="button">完成</button>
          </div>
        </div>
      </section>

      <section class="loading-view hidden" id="loading-view">
        <div class="loading-shell">
          <span class="loading-dot"></span>
          <p id="loading-text">正在理解这一条记录…</p>
        </div>
      </section>

      <section class="feedback-view hidden" id="feedback-view">
        <div class="feedback-shell">
          <div class="feedback-header">
            <p id="feedback-eyebrow" class="eyebrow">即时反馈</p>
            <button id="back-to-write-button" class="back-button" type="button">继续写</button>
          </div>

          <article class="feedback-card">
            <p class="card-label">summary</p>
            <p id="feedback-summary" class="card-body"></p>
          </article>

          <article class="feedback-card">
            <p class="card-label">emotion</p>
            <div id="feedback-emotion" class="emotion-wrap"></div>
          </article>

          <article class="feedback-card">
            <p class="card-label">keywords</p>
            <div id="feedback-keywords" class="keyword-wrap"></div>
          </article>

          <article class="feedback-card">
            <p class="card-label">reflection</p>
            <p id="feedback-reflection" class="card-body reflection-body"></p>
          </article>

          <article class="feedback-card system-anchor-card">
            <p class="card-label">system anchor</p>
            <p id="feedback-anchor" class="system-anchor-text"></p>
          </article>
        </div>
      </section>

      <aside class="history-panel hidden" id="history-panel" aria-hidden="true">
        <div class="history-header">
          <div>
            <p class="eyebrow">Timeline</p>
            <h2 id="history-title">历史记录</h2>
          </div>
          <button id="close-history-button" class="history-close" type="button">返回输入</button>
        </div>

        <label class="history-search" for="history-search-input">
          <input id="history-search-input" type="search" placeholder="搜索记录、情绪、关键词" />
        </label>

        <article id="history-overview-card" class="history-overview-card hidden" aria-live="polite">
          <p id="history-overview-title" class="card-label"></p>
          <p id="history-overview-body" class="context-text"></p>
        </article>

        <div class="history-list" id="history-list"></div>

        <button id="floating-write-button" class="floating-write-button" type="button">+</button>
      </aside>
    </main>

    <template id="history-item-template">
      <section class="history-group">
        <p class="history-group-label"></p>
        <div class="history-group-items"></div>
      </section>
    </template>

    <template id="history-entry-template">
      <button class="history-item" type="button">
        <div class="history-top">
          <span class="history-date"></span>
          <span class="history-emotion"></span>
        </div>
        <p class="history-summary"></p>
        <p class="history-preview"></p>
        <div class="history-keywords"></div>
      </button>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
