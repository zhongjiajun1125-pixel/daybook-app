<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1b1e" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#f9fafb" media="(prefers-color-scheme: light)">
    
    <title>Trace</title>
    
    <link rel="manifest" href="./manifest.json?v=20260402-1">
    <link rel="icon" href="./trace-logo-black.png">
    <link rel="apple-touch-icon" href="./trace-logo-black.png">
    
    <link rel="stylesheet" href="./styles.css?v=20260402-9" />
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.getRegistrations()
            .then((registrations) => Promise.all(registrations.map((registration) => registration.unregister())))
            .then(() => ("caches" in window ? caches.keys().then((keys) => Promise.all(keys.map((key) => caches.delete(key)))) : undefined))
            .catch(() => {});
        });
      }
    </script>
  </head>
  <body class="time-day runtime-pending">
    <div id="trace-loading" class="trace-loading hidden" aria-live="polite" aria-atomic="true">
      <img
        id="trace-loading-mark"
        class="trace-logo trace-logo--loading"
        src="./trace-logo-black.png"
        data-light-src="./trace-logo-black.png"
        data-dark-src="./trace-logo-white.png"
        alt=""
        width="254"
        height="259"
        aria-hidden="true"
      />
      <span id="trace-loading-label" class="trace-loading-label">等一下…</span>
    </div>

    <main id="app-root" class="app-shell">
      
      <section id="unlock-view" class="view-section unlock-view hidden">
        <div class="unlock-shell">
          <div class="trace-identity trace-identity--unlock">
            <img
              id="unlock-trace-mark"
              class="trace-logo trace-logo--unlock"
              src="./trace-logo-black.png"
              data-light-src="./trace-logo-black.png"
              data-dark-src="./trace-logo-white.png"
              alt=""
              width="254"
              height="259"
              aria-hidden="true"
            />
            <span class="trace-wordmark trace-wordmark--identity">Trace</span>
          </div>
          <p id="unlock-title" class="unlock-title">从这里进去</p>
          <p id="unlock-subtitle" class="unlock-subtitle">还是原来的地方</p>
          <div id="pin-panel" class="pin-panel">
            <input
              id="pin-input"
              class="pin-input"
              type="password"
              inputmode="numeric"
              pattern="[0-9]*"
              maxlength="6"
              autocomplete="off"
              placeholder="那几个数字"
            />
          </div>
          <button id="unlock-btn" class="unlock-btn unlock-btn--primary" type="button">进去</button>
        </div>
      </section>

      <section id="onboarding-view" class="view-section active">
        <div id="threshold-shell" class="threshold-shell">
          <div class="trace-identity trace-identity--hero">
            <img
              id="onboarding-trace-mark"
              class="trace-logo trace-logo--hero"
              src="./trace-logo-black.png"
              data-light-src="./trace-logo-black.png"
              data-dark-src="./trace-logo-white.png"
              alt=""
              width="254"
              height="259"
              aria-hidden="true"
            />
            <span class="trace-wordmark trace-wordmark--identity">Trace</span>
          </div>
          <p id="threshold-line" class="threshold-line">先停一下。</p>
          <div class="action-shell action-shell--threshold">
            <button id="enter-writing-btn" class="primary-action-btn" type="button">继续</button>
          </div>
        </div>
      </section>

      <section id="compose-view" class="view-section hidden">
        <div class="compose-shell">
          <div id="echo-card-layer" class="echo-card-layer" aria-live="polite" aria-atomic="true">
            <article id="echo-card" class="echo-card hidden">
              <p id="echo-card-line-1" class="echo-card-line"></p>
              <p id="echo-card-line-2" class="echo-card-line"></p>
              <p id="echo-card-line-3" class="echo-card-line echo-card-tail"></p>
            </article>
          </div>

          <article class="writing-card">
            <div class="paper-header">
              <div class="paper-presence">
                <img
                  id="compose-trace-mark"
                  class="trace-logo trace-logo--mark"
                  src="./trace-logo-black.png"
                  data-light-src="./trace-logo-black.png"
                  data-dark-src="./trace-logo-white.png"
                  alt=""
                  width="254"
                  height="259"
                  aria-hidden="true"
                />
                <span class="paper-kicker">现在</span>
              </div>
            </div>
            <textarea
              id="raw-memory-input"
              class="seamless-input"
              placeholder="写一点。"
              autofocus
            ></textarea>
            <div class="compose-footer">
              <span id="save-status" class="status-indicator" aria-live="polite"></span>
              <div class="voice-zone" aria-label="语音输入">
                <button id="control-voice" class="voice-entry" type="button" aria-pressed="false">
                  <span id="voice-entry-label" class="voice-entry-label" aria-live="polite">点一下说出来</span>
                  <span id="voice-entry-help" class="voice-entry-help" aria-live="polite">不想打字时，也可以直接说。</span>
                </button>
              </div>
              <div id="control-hub" class="control-hub" aria-label="写作操作">
                <div id="control-actions" class="control-actions control-actions--visible" aria-hidden="false">
                  <button id="control-save" class="control-action control-action--primary" type="button">留下</button>
                  <button id="control-history" class="control-action" type="button">回看</button>
                  <button id="control-anchor" class="control-action" type="button">标一下</button>
                  <button id="control-dismiss" class="control-action" type="button">算了</button>
                </div>
                <div id="anchor-options" class="anchor-options" aria-hidden="true">
                  <button class="anchor-option" data-anchor="焦滞" type="button">卡着</button>
                  <button class="anchor-option" data-anchor="游离" type="button">散着</button>
                  <button class="anchor-option" data-anchor="澄明" type="button">清一点</button>
                  <button class="anchor-option" data-anchor="沉缩" type="button">收着</button>
                </div>
              </div>
            </div>
          </article>
        </div>
      </section>

      <aside id="history-panel" class="history-panel hidden" aria-hidden="true">
        <div class="history-header">
          <h2>回看</h2>
          <button id="close-history-btn" class="close-btn" type="button">继续写</button>
        </div>
        <div id="review-tools" class="review-tools" aria-label="阅读偏好">
          <button
            id="review-tools-entry"
            class="review-tools-entry"
            type="button"
            aria-expanded="false"
            aria-controls="review-tools-body"
          >
            换一下
          </button>
          <div id="review-tools-body" class="review-tools-body" aria-hidden="true">
            <div class="review-tool-row">
              <span class="review-tool-label">字</span>
              <button id="reading-font-system" class="review-tool-option" data-reading-font="system" type="button">平一点</button>
              <button id="reading-font-serif" class="review-tool-option" data-reading-font="serif" type="button">读着</button>
            </div>
            <div class="review-tool-row">
              <span class="review-tool-label">声</span>
              <button id="ambient-sound-off" class="review-tool-option" data-ambient-sound="off" type="button">安静</button>
              <button id="ambient-sound-light" class="review-tool-option" data-ambient-sound="light" type="button">轻一点</button>
              <button id="ambient-sound-deep" class="review-tool-option" data-ambient-sound="deep" type="button">深一点</button>
            </div>
          </div>
        </div>
        
        <div id="history-pattern-layer" class="history-pattern-layer empty">
          <div id="insight-summary" class="history-narrative"></div>
          <div class="insight-graph">
            <canvas id="insight-canvas"></canvas>
          </div>
        </div>
        
        <div class="history-list" id="history-list"></div>
      </aside>
    </main>

    <template id="history-entry-template">
      <article class="history-item">
          <div class="history-primary">
            <div class="history-meta">
              <time class="history-time"></time>
              <span class="history-mode hidden"></span>
              <span class="history-metadata hidden"></span>
              <button class="history-delete-btn" type="button" aria-label="删掉这条">删掉</button>
            </div>
            <p class="history-raw-text"></p>
          </div>
        <div class="history-secondary hidden">
          <p class="history-echo-text"></p>
        </div>
      </article>
    </template>

    <script src="./app.js?v=20260402-9"></script>
  </body>
</html>
