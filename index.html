<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1b1e" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#f9fafb" media="(prefers-color-scheme: light)">
    
    <title>Trace - 认知显影系统</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="time-day">
    <nav id="global-tools" class="hidden">
      <button id="export-data-btn" class="ghost-btn" type="button" aria-label="导出数据">导出</button>
      <button id="history-toggle" class="ghost-btn" type="button" aria-label="时间线">历史</button>
    </nav>

    <main id="app-root" class="app-shell">
      
      <section id="onboarding-view" class="view-section active">
        <div class="narrative-shell">
          <p>这里是 Trace。</p>
          <p>一个不对你做任何评价的认知显影系统。</p>
          <br>
          <p>不需要整理，也不需要写得完整。</p>
          <p>你只需要丢下一件正在发生的事，或一个闪现的想法。</p>
          <p>哪怕只有几个字。</p>
          <br>
          <p>它只负责吞咽和保存。</p>
          <p>并在未来的某一天，向你折射出潜意识的真实轨迹。</p>
          <br>
          <p>当你准备好了，留下第一道印迹。</p>
        </div>
        <div class="action-shell">
          <button id="enter-writing-btn" class="primary-action-btn" type="button">→ 开始记录</button>
        </div>
      </section>

      <section id="compose-view" class="view-section hidden">
        <div class="compose-shell">
          <aside id="system-echo-panel" class="echo-panel empty" aria-live="polite"></aside>

          <article class="writing-card">
            <textarea
              id="raw-memory-input"
              class="seamless-input"
              placeholder="写下此刻。"
              autofocus
            ></textarea>
          </article>

          <div class="compose-footer">
            <span id="save-status" class="status-indicator"></span>
            <button id="save-entry-btn" class="subtle-submit-btn" type="button">完成</button>
          </div>
        </div>
      </section>

      <aside id="history-panel" class="history-panel hidden" aria-hidden="true">
        <div class="history-header">
          <h2>系统记录</h2>
          <button id="close-history-btn" class="close-btn" type="button">返回</button>
        </div>
        <div class="history-list" id="history-list"></div>
      </aside>
    </main>

    <template id="history-entry-template">
      <article class="history-item">
        <div class="history-meta">
          <time class="history-time"></time>
          <span class="history-friction hidden"></span>
        </div>
        <p class="history-raw-text"></p>
      </article>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
