<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1b1e" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#f9fafb" media="(prefers-color-scheme: light)">
    
    <title>Trace - 认知显影系统</title>
    
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Ccircle cx='256' cy='256' r='200' fill='%23171717'/%3E%3C/svg%3E">
    
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="time-day">
    <nav id="global-tools" class="hidden">
      <input type="file" id="import-file-input" accept=".json" style="display: none;" />
      <button id="font-toggle-btn" class="ghost-btn" type="button">字体</button>
      <button id="import-data-btn" class="ghost-btn" type="button">导入</button>
      <button id="export-data-btn" class="ghost-btn" type="button">导出</button>
      <button id="history-toggle" class="ghost-btn" type="button">拓扑</button>
    </nav>

    <main id="app-root" class="app-shell">
      
      <section id="unlock-view" class="view-section active" style="display: flex; align-items: center; justify-content: center; height: 100%;">
        <button id="unlock-btn" class="ghost-btn" style="font-size: 1.1rem; letter-spacing: 0.2em; padding: 20px;">触碰以唤醒</button>
      </section>

      <section id="onboarding-view" class="view-section hidden">
        <div class="narrative-shell">
          <p class="eyebrow-text">TRACE / PERSONAL COGNITION SPACE</p>
          <p class="hero-text">给不想被打扰，但又隐约想看清自己的人。</p>
          <br><br>
          <p>Trace 不是日记，它是你的认知黑匣子。</p>
          <p>没有社交，没有点赞，不需要排版。</p>
          <p>系统静默抓取你的情绪锚点、打字停顿与删改摩擦。</p>
          <p>它偶尔会说中你。</p>
          <br><br>
          <p>准备好留下第一道印迹了吗？</p>
        </div>
        <div class="action-shell">
          <button id="enter-writing-btn" class="primary-action-btn" type="button">→ 开启显影</button>
        </div>
      </section>

      <section id="compose-view" class="view-section hidden">
        <div class="compose-shell">
          <aside id="system-echo-panel" class="echo-panel empty" aria-live="polite"></aside>

          <article class="writing-card">
            <div class="paper-header">
              <span class="paper-kicker">此刻切片</span>
              <span id="font-style-label" class="paper-meta">系统体</span>
            </div>
            <textarea
              id="raw-memory-input"
              class="seamless-input"
              placeholder="写下此刻。"
              autofocus
            ></textarea>
            
            <div id="cognitive-anchors" class="anchor-bar">
              <button class="anchor-btn" data-anchor="澄明">澄明</button>
              <button class="anchor-btn" data-anchor="游离">游离</button>
              <button class="anchor-btn" data-anchor="焦滞">焦滞</button>
              <button class="anchor-btn" data-anchor="沉缩">沉缩</button>
            </div>
          </article>

          <div class="compose-footer">
            <span id="save-status" class="status-indicator"></span>
            <div class="footer-actions">
              <button id="swallow-btn" class="subtle-submit-btn" type="button">吞噬</button>
              <button id="save-entry-btn" class="subtle-submit-btn" type="button">封存</button>
            </div>
          </div>
        </div>
      </section>

      <aside id="history-panel" class="history-panel hidden" aria-hidden="true">
        <div class="history-header">
          <h2>认知拓扑</h2>
          <button id="close-history-btn" class="close-btn" type="button">返回</button>
        </div>
        
        <div id="history-pattern-layer" class="history-pattern-layer empty"></div>
        
        <div class="history-list" id="history-list"></div>
      </aside>
    </main>

    <template id="history-entry-template">
      <article class="history-item">
        <div class="history-meta">
          <time class="history-time"></time>
          <span class="history-metadata hidden"></span>
          <span class="history-friction hidden"></span>
        </div>
        <p class="history-raw-text"></p>
      </article>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
